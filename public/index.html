<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tish playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/playground.css" />
</head>
<body>
  <div id="app"></div>
  <script type="module">
    window.__tishDecodeB64 = function (b64) {
      return Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
    };

    import vmInit, { run } from "./dist/tish_vm.js";
    await vmInit();

    import compilerInit, { compile_to_bytecode, compile_to_js, compile_to_bytecode_with_imports, compile_to_js_with_imports } from "./dist/tish_compiler.js";
    await compilerInit();
    window.__tishCompileToBytecode = compile_to_bytecode;
    window.__tishCompileToJs = compile_to_js;
    window.__tishCompileToBytecodeWithImports = compile_to_bytecode_with_imports;
    window.__tishCompileToJsWithImports = compile_to_js_with_imports;

    window.__tishVmRunCaptured = function (chunk) {
      const lines = [];
      const orig = console.log;
      console.log = function (...args) {
        lines.push(args.map(String).join(" "));
        orig.apply(console, args);
      };
      try {
        run(chunk);
      } catch (e) {
        lines.push("Runtime: " + String(e));
      } finally {
        console.log = orig;
      }
      return lines;
    };

    await import("./dist/playground.js");
  </script>
</body>
</html>
